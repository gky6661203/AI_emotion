version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: aiemotion_postgres
    environment:
      POSTGRES_DB: aiemotion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiemotion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiemotion_network

  ts-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ts-api
    container_name: aiemotion_ts_api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aiemotion
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aiemotion_network

  ai-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai-engine
    container_name: aiemotion_ai_engine
    environment:
      # 这里必须至少留一个空行 / 或者删掉 environment，不能只写注释
      PORT: 8090
    ports:
      - "8090:8090"
    networks:
      - aiemotion_network

volumes:
  postgres_data:

networks:
  aiemotion_network:
    driver: bridge