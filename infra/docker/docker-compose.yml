version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: aiemotion_postgres
    environment:
      POSTGRES_DB: aiemotion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiemotion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiemotion_network

  redis:
    image: redis:7-alpine
    container_name: aiemotion_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiemotion_network

  minio:
    image: minio/minio:latest
    container_name: aiemotion_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - aiemotion_network

  ts-api:
    build:
      context: ../../services/ts-api
      dockerfile: ../../infra/docker/Dockerfile.ts-api
    container_name: aiemotion_ts_api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aiemotion
      REDIS_URL: redis://redis:6379
      PYTHON_TOOLS_PATH: /app/python-tools
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiemotion_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  aiemotion_network:
    driver: bridge
